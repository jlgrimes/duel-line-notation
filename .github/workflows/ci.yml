name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ci

  # Verifies bridge.cpp against the pinned core with an ordinary C++ compiler. The
  # WebAssembly build needs Emscripten and only republishes from the ocgcore-wasm workflow
  # on main, so without this a bridge regression would not surface until after merge.
  bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run ocgcore:fetch
      - run: npm run ocgcore:native-check

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Only Chromium is needed: the suite covers a desktop and a phone viewport.
      # Real mobile Safari remains a manual check, as recorded in CHECKLIST.md.
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
